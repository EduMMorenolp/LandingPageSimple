<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />

    <!-- CSS -->
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/footer.css" />
    <link rel="stylesheet" href="./css/animations.css" />

    <title></title>
  </head>

  <body>
    <!-- Floating Navigation -->
    <header id="navbar">
      <div class="nav-content">
        <button id="menu-toggle" class="icon-btn menu-btn" aria-label="">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <a href="#" class="logo"></a>
        <nav>
          <ul>
            <li><a href="#habilidades"></a></li>
            <li><a href="#proyectos"></a></li>
            <li><a href="#experiencia"></a></li>
            <li><a href="#contacto"></a></li>
          </ul>
        </nav>
        <div class="nav-actions">
          <button id="theme-toggle" class="icon-btn" aria-label="">
            <svg
              class="nav-icon sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="nav-icon moon-icon hidden"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button id="lang-toggle" class="lang-btn" aria-label="">
            <span class="lang-text">ES</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <!-- Hero Section -->
      <section id="inicio" class="hero section-padding">
        <div class="container hero-grid">
          <div class="hero-text">
            <span class="badge"></span>
            <h1 class="fade-in-up"></h1>
            <p class="fade-in-up delay-1"></p>
            <div class="hero-buttons fade-in-up delay-2">
              <a href="#proyectos" class="btn btn-primary"></a>
              <a href="#contacto" class="btn btn-outline"></a>
            </div>

            <div class="social-links fade-in-up delay-3">
              <a
                href="https://github.com/EduMMorenolp"
                target="_blank"
                aria-label=""
              >
                <img
                  src="./img/iconos/MdiGithub.svg"
                  alt=""
                  class="social-icon"
                />
              </a>
              <a
                href="https://linkedin.com/in/eduardo-m-moreno-programador"
                target="_blank"
                aria-label=""
              >
                <img
                  src="./img/iconos/MdiLinkedin.svg"
                  alt=""
                  class="social-icon"
                />
              </a>
            </div>
          </div>

          <!-- Profile Images with Flip Effect -->
          <div class="image-wrapper fade-in-up">
            <div class="profile-container">
              <div class="profile-card">
                <div class="profile-back">
                  <img
                    src="./img/FotoReal.jpg"
                    alt=""
                    class="profile-img"
                  />
                </div>
                <div class="profile-front">
                  <img
                    src="./img/EduMMorenoGhibli-2-510x510.png"
                    alt=""
                    class="profile-img"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Skills Section -->
      <section id="habilidades" class="section-padding">
        <div class="container">
          <h2 class="section-title text-center"></h2>
          <div class="bento-grid"></div>
        </div>
      </section>

      <!-- Experience Section -->
      <section id="experiencia" class="section-padding">
        <div class="container">
          <h2 class="section-title text-center"></h2>
          <div class="experience-timeline"></div>
        </div>
      </section>

      <!-- Projects Section -->
      <section id="proyectos" class="section-padding">
        <div class="container">
          <h2 class="section-title text-center"></h2>

          <!-- Carousel Navigation (Mobile Only) -->
          <div class="carousel-nav">
            <button
              id="prev-project"
              class="nav-arrow"
              aria-label=""
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <button
              id="next-project"
              class="nav-arrow"
              aria-label=""
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
          <div class="projects-grid" id="proyecto">
            <!-- Projects will be injected here by JavaScript -->
          </div>
        </div>
      </section>

      <!-- Contact Section -->
      <section id="contacto" class="section-padding">
        <div class="container contact-wrapper">
          <div class="contact-content">
            <h2></h2>
            <p></p>
            <div class="contact-methods">
              <a
                href="#"
                class="contact-item email-link"
                data-email="ZS5tLm1vcmVub2xwQGdtYWlsLmNvbQ=="
              >
                <img src="https://skillicons.dev/icons?i=gmail" alt="" />
                <span class="email-text"></span>
              </a>
            </div>
          </div>
          <div class="contact-form-container">
            <form
              action="#"
              method="POST"
              class="modern-form"
              id="contact-form"
              data-email="ZS5tLm1vcmVub2xwQGdtYWlsLmNvbQ=="
            >
              <input
                type="hidden"
                name="_next"
                value="https://edummorenolp.github.io/LandingPageSimple/"
              />
              <input type="hidden" name="_captcha" value="false" />

              <div class="input-group">
                <input
                  type="text"
                  id="name"
                  name="name"
                  required
                  placeholder=" "
                />
                <label for="name"></label>
              </div>
              <div class="input-group">
                <input
                  type="email"
                  id="email"
                  name="email"
                  required
                  placeholder=" "
                />
                <label for="email"></label>
              </div>
              <div class="input-group">
                <textarea
                  id="message"
                  name="message"
                  required
                  placeholder=" "
                ></textarea>
                <label for="message"></label>
              </div>
              <button type="submit" class="btn btn-primary btn-full">
              
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p></p>
      </div>
    </footer>

    <!-- JavaScript -->
    <script src="./js/i18n.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/form.js"></script>
  </body>
</html>
